
atlas {
  cloudwatch {

    // https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/observability-gateway-metrics.html
    agentcore-aggr = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "AggregateOperation",
      ]

      metrics = [
         {
          name = "Sessions"
          alias = "aws.agentcore.sessions"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "ItemType",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "CreationCount"
          alias = "aws.agentcore.creationCount"
          conversion = "sum,rate"
        },

        {
          name = "TokenCount"
          alias = "aws.agentcore.tokens"
          conversion = "sum,rate"
        }
      ]
    }

    // Memory: per-operation, per-resource breakdown (short-term + long-term)
    agentcore-memory = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation",
        "Resource",
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Duration"
          alias = "aws.agentcore.duration"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "TokenCount"
          alias = "aws.agentcore.tokens"
          conversion = "sum,rate"
        }
      ]
    }

    // Long-term memory: per-strategy extraction/consolidation breakdown
    agentcore-memory-long-term = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation",
        "Resource",
        "StrategyId",
        "StrategyType"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "TokenCount"
          alias = "aws.agentcore.tokens"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        }
      ]
    }

    // Memory aggregate across all resources (short-term + long-term)
    agentcore-memory-aggr = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "TokenCount"
          alias = "aws.agentcore.tokens"
          conversion = "sum,rate"
        }
      ]
    }

    // Memory aggregate CreationCount by item type (short-term + long-term)
    agentcore-memory-itemtype-aggr = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "ItemType"
      ]

      metrics = [
        {
          name = "CreationCount"
          alias = "aws.agentcore.creationCount"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore-gateway = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation",
        "Name",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Duration"
          alias = "aws.agentcore.duration"
          conversion = "timer-millis"
        },
        {
          name = "TargetExecutionTime"
          alias = "aws.agentcore.targetExecutionTime"
          conversion = "timer-millis"
        },
        {
          name = "Sessions"
          alias = "aws.agentcore.sessions"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore-runtime = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Service",
        "Resource",
        "Name"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "InboundStreamingBytesProcessed"
          alias = "aws.agentcore.bytesProcessed"
          conversion = "sum,rate"
          tags = [
            {
              key = "id"
              value = "in"
            }
          ]
        },
        {
          name = "OutboundStreamingBytesProcessed"
          alias = "aws.agentcore.bytesProcessed"
          conversion = "sum,rate"
          tags = [
            {
              key = "id"
              value = "out"
            }
          ]
        },
         {
          name = "ActiveStreamingConnections"
          alias = "aws.agentcore.activeStreamingConnections"
          conversion = "max"
        },
        {
          name = "MemoryUsed-GBHours"
          alias = "aws.agentcore.memoryUsed"
          conversion = "sum"
        },
        {
          name = "CPUUsed-vCPUHours"
          alias = "aws.agentcore.cpuUsed"
          conversion = "sum"
        }
      ]
    }

    // Runtime resource usage rolled up without endpoint name
    agentcore-runtime-svc = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Resource",
        "Service"
      ]

      metrics = [
        {
          name = "MemoryUsed-GBHours"
          alias = "aws.agentcore.memoryUsed"
          conversion = "sum"
        },
        {
          name = "CPUUsed-vCPUHours"
          alias = "aws.agentcore.cpuUsed"
          conversion = "sum"
        }
      ]
    }

    // Aggregate service-level resource usage
    agentcore-svc = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Service"
      ]

      metrics = [
        {
          name = "MemoryUsed-GBHours"
          alias = "aws.agentcore.memoryUsed"
          conversion = "sum"
        },
        {
          name = "CPUUsed-vCPUHours"
          alias = "aws.agentcore.cpuUsed"
          conversion = "sum"
        }
      ]
    }

    // Identity token fetch metrics
    agentcore-identity = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "WorkloadIdentity",
        "WorkloadIdentityDirectory"
      ]

      metrics = [
        {
          name = "WorkloadAccessTokenFetchSuccess"
          alias = "aws.agentcore.tokenFetchSuccess"
          conversion = "sum,rate"
        }
      ]
    }

    // Fully aggregated (no dimensions)
    agentcore-nodim = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = []

      metrics = [
        {
          name = "WorkloadAccessTokenFetchSuccess"
          alias = "aws.agentcore.tokenFetchSuccess"
          conversion = "sum,rate"
        }
      ]
    }

    tagger.mappings = ${?atlas.cloudwatch.tagger.mappings} [
      {
        name = "WorkloadIdentity"
        alias = "aws.workloadIdentity"
      },
      {
        name = "WorkloadIdentityDirectory"
        alias = "aws.workloadIdentityDir"
      }
    ]

    // Extract memory ID from Resource ARN for clean atlas tags
    tagger.extractors = ${?atlas.cloudwatch.tagger.extractors} [
      {
        name = "Resource"
        directives = [
          {
            pattern = "arn:aws:bedrock-agentcore:[^:]+:\\d+:memory/(.*)"
            alias = "aws.agent-memory"
          }
        ]
      }
    ]
  }
}
