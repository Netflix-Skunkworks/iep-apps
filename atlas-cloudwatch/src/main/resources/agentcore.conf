
atlas {
  cloudwatch {

    // https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/observability-gateway-metrics.html
    agentcore-aggr = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "AggregateOperation",
      ]

      metrics = [
         {
          name = "Sessions"
          alias = "aws.agentcore.sessions"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "ItemType",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "CreationCount"
          alias = "aws.agentcore.creationCount"
          conversion = "sum,rate"
        },

        {
          name = "TokenCount"
          alias = "aws.agentcore.tokens"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore-memory = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      // Union of dimensions seen for long- and short-term memory
      dimensions = [
        "Operation",
        "Resource",
      ]

      metrics = [
        // Core memory request lifecycle
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "NumberOfMemoryRecords"
          alias = "aws.agentcore.records"
          conversion = "max"
        }
      ]
    }

    agentcore-gateway = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation",
        "Name",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Duration"
          alias = "aws.agentcore.duration"
          conversion = "timer-millis"
        },
        {
          name = "TargetExecutionTime"
          alias = "aws.agentcore.targetExecutionTime"
          conversion = "timer-millis"
        },
        {
          name = "Sessions"
          alias = "aws.agentcore.sessions"
          conversion = "sum,rate"
        }
      ]
    }

    agentcore-runtime = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Service",
        "Resource",
        "Name"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Errors"
          alias = "aws.agentcore.errors"
          conversion = "sum,rate"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
        },
        {
          name = "InboundStreamingBytesProcessed"
          alias = "aws.agentcore.bytesProcessed"
          conversion = "sum,rate"
          tags = [
            {
              key = "id"
              value = "in"
            }
          ]
        },
        {
          name = "OutboundStreamingBytesProcessed"
          alias = "aws.agentcore.bytesProcessed"
          conversion = "sum,rate"
          tags = [
            {
              key = "id"
              value = "out"
            }
          ]
        },
         {
          name = "ActiveStreamingConnections"
          alias = "aws.agentcore.activeStreamingConnections"
          conversion = "max"
        },
        {
          name = "MemoryUsed-GBHours"
          alias = "aws.agentcore.memoryUsed"
          conversion = "sum"
        },
        {
          name = "CPUUsed-vCPUHours"
          alias = "aws.agentcore.cpuUsed"
          conversion = "sum"
        }
      ]
    }
  }
}
