
atlas {
  cloudwatch {

    // https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/observability-gateway-metrics.html
    agentcore-gateway = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Operation",
        "Protocol",
        "Method",
        "Name",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Duration"
          alias = "aws.agentcore.duration"
          conversion = "timer-millis"
        },
        {
          name = "TargetExecutionTime"
          alias = "aws.agentcore.targetExecutionTime"
          conversion = "timer-millis"
        }
      ]
    }

    agentcore-runtime = {
      namespace = "AWS/Bedrock-AgentCore"
      period = 1m
      end-period-offset = 5

      dimensions = [
        "Service",
        "Resource"
      ]

      metrics = [
        {
          name = "Invocations"
          alias = "aws.agentcore.invocations"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "Throttles"
          alias = "aws.agentcore.throttles"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "SystemErrors"
          alias = "aws.agentcore.systemErrors"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "UserErrors"
          alias = "aws.agentcore.userErrors"
          conversion = "sum,rate"
          unit = "Count"
        },
        {
          name = "Latency"
          alias = "aws.agentcore.latency"
          conversion = "timer-millis"
        },
        {
          name = "Duration"
          alias = "aws.agentcore.duration"
          conversion = "timer-millis"
        }
      ]
    }
  }
}
