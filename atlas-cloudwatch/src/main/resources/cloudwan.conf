          conversion = "sum,rate"
          tags = [{key = "id", value = "NoRoute"}]
        },
        {
          name = "PacketDropCountNoRoute"
          alias = "aws.cloudwan.maxPacketsDropped"
          conversion = "max"
          tags = [{key = "id", value = "NoRoute"}]
        },
        {
          name = "PacketDropTTLExpired"
