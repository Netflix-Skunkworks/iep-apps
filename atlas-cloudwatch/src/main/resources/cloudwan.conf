          tags = [{key = "id", value = "Blackhole"}]
        },
        {
          name = "BytesDropCountBlackhole"
          alias = "aws.cloudwan.maxBytesDropped"
          conversion = "max"
          tags = [{key = "id", value = "Blackhole"}]
        },
        {
